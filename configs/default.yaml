DATA:
  dataset_name: mvfouls
  data_root: mvfouls
  annotations:
    train: mvfouls/train/annotations.json
    valid: mvfouls/valid/annotations.json
    test: mvfouls/test/annotations.json
  num_frames: 16              # 8 before + 8 after the foul
  input_fps: 30               # Original FPS of video
  target_fps: 8               # Temporal downsampling to 1s clip (approx)
  frame_size: [224, 398]      # Spatial resolution (HxW)
  normalize:
    mean: [0.45, 0.45, 0.45]
    std: [0.225, 0.225, 0.225]
  num_workers: 4
  batch_size: 8

MODEL:
  name: mvit_v2_s                
  weights: MViT_V2_S_Weights
  pretrained: true
  num_classes: 10
  dropout: 0.3

TRAIN:
  enabled: true
  epochs: 10
  batch_size: 8
  learning_rate: 0.0001
  lr_decay: exponential
  weight_decay: 0.05
  optimizer: adamw
  loss_fn: cross_entropy
  grad_clip_val: 0.0
  lr_warmup_epochs: 5
  device: cuda
  save_dir: ./checkpoints
  log_interval: 10
  save_every: 5

SYSTEM:
  seed: 42
  mixed_precision: true
  deterministic: false
  gpu: 0
  log_dir: ./logs

