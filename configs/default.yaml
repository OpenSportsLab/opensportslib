DATA:
  dataset_name: mvfouls
  data_root: mvfouls
  annotations:
    train: mvfouls/train/annotations.json
    valid: mvfouls/valid/annotations.json
    test: mvfouls/test/annotations.json
  num_frames: 16               # 8 before + 8 after the foul
  input_fps: 25                # Original FPS of video
  target_fps: 16               # Temporal downsampling to 1s clip (approx)
  frame_size: [224, 224]       # Spatial resolution (HxW)
  normalize:
    mean: [0.45, 0.45, 0.45]
    std: [0.225, 0.225, 0.225]
  num_workers: 1
  batch_size: 2

MODEL:
  name: mvit_v2_s                
  weights: MViT_V2_S_Weights
  pretrained: true
  num_classes: 8
  feature_dim: 400
  agr_type: "max"

TRAIN:
  enabled: true
  epochs: 5
  optimizer: adamw
  learning_rate: 0.0001
  betas: (0.9, 0.999)
  eps: 0.0000001
  weight_decay: 0.001
  amsgrad: False
  lr_decay: StepLR
  step_size: 3
  gamma: 0.1
  loss_fn: cross_entropy
  save_dir: ./checkpoints
  log_interval: 10
  save_every: 5

SYSTEM:
  log_dir: ./logs
  seed: 42

