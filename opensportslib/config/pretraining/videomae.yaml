TASK: pretraining

SSL:
  method: mae
  mae:
    mask_ratio: 0.9
    mask_type: tube          # random | tube
    norm_pix_loss: true

DATA:
  data_dir: /path/to/unlabeled/videos
  num_frames: 16             # 8 | 16 | 32
  frame_size: [224, 224]     # [224,224] | [384,384]
  patch_size: 16             # 14 | 16
  tubelet_size: 2
  batch_size: 64             # 32 - 256
  num_workers: 4
  input_fps: 25
  target_fps: null
  augmentations:
    random_horizontal_flip: true
    color_jitter: true
    jitter_params: [0.4, 0.4, 0.4, 0.1]
    random_crop: true

MODEL:
  encoder:
    type: vit_base           # vit_small | vit_base | vit_large
    embed_dim: 768           # 384 | 768 | 1024
    depth: 12                # 12 | 24
    num_heads: 12            # 6 | 12 | 16
  decoder:
    depth: 4                 # 2 - 8 (lighter than encoder)
    embed_dim: 256           # 128 - 512
    num_heads: 8

TRAIN:
  epochs: 200                # 100 - 800
  save_every: 20
  optimizer:
    type: AdamW
    lr: 0.0001               # 1e-4 to 1.5e-4
    betas: [0.9, 0.95]
    eps: 0.00000001
    weight_decay: 0.05       # 0.04 - 0.1
    amsgrad: false
  scheduler:
    type: CosineAnnealingLR
    T_max: 200               # should match epochs
  warmup_epochs: 10          # 5 - 40
  save_backbone_only: true   # discard decoder after training

SYSTEM:
  log_dir: ./logs
  save_dir: ./checkpoints
  use_seed: true
  seed: 42
  GPU: 4
  device: cuda
  gpu_id: 0
