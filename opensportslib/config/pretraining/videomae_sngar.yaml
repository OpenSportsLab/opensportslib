TASK: pretraining

SSL:
  method: mae
  mae:
    mask_ratio: 0.9
    mask_type: tube
    norm_pix_loss: true

DATA:
  data_dir: /ibex/scratch/alkhudmk/sngar-frames/train
  num_frames: 16
  frame_size: [224, 224]
  patch_size: 16
  tubelet_size: 2
  batch_size: 64
  num_workers: 8
  input_fps: null
  target_fps: null
  augmentations:
    random_horizontal_flip: true
    color_jitter: true
    jitter_params: [0.4, 0.4, 0.4, 0.1]
    random_crop: true

MODEL:
  encoder:
    type: vit_base
    embed_dim: 768
    depth: 12
    num_heads: 12
  decoder:
    depth: 4
    embed_dim: 256
    num_heads: 8

TRAIN:
  epochs: 200
  save_every: 20
  optimizer:
    type: AdamW
    lr: 0.0001
    betas: [0.9, 0.95]
    eps: 0.00000001
    weight_decay: 0.05
    amsgrad: false
  scheduler:
    type: CosineAnnealingLR
    T_max: 200
  warmup_epochs: 10
  save_backbone_only: true

SYSTEM:
  log_dir: ./logs
  save_dir: /ibex/scratch/alkhudmk/ssl_checkpoints
  use_seed: true
  seed: 42
  GPU: 4
  device: cuda
  gpu_id: 0
