TASK: localization

dali: false

DATA:
  dataset_name: SoccerNet
  data_dir: /home/vorajv/opensportslib/SoccerNet/
  classes:
    - Penalty
    - Kick-off
    - Goal
    - Substitution
    - Offside
    - Shots on target
    - Shots off target
    - Clearance
    - Ball out of play
    - Throw-in
    - Foul
    - Indirect free-kick
    - Direct free-kick
    - Corner
    - Yellow card
    - Red card
    - Yellow->red card
    
  epoch_num_frames: 500000
  mixup: true
  modality: rgb
  crop_dim: -1
  dilate_len: 0        # Dilate ground truth labels
  clip_len: 100
  input_fps: 25
  extract_fps: 2
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std: [0.229, 0.224, 0.225]
  target_height: 224
  target_width: 398

  train:
    type: FeatureClipsfromJSON
    classes: ${DATA.classes}
    output_map: [data, label]
    video_path: ${DATA.data_dir}
    path: ${DATA.train.video_path}/annotations-2024-224p-train.json
    framerate: 2
    window_size: 20
    dataloader:
      batch_size: 256
      shuffle: true
      num_workers: 4
      pin_memory: true

  valid:
    type: FeatureClipsfromJSON
    classes: ${DATA.classes}
    output_map: [data, label]
    video_path: ${DATA.data_dir}
    path: ${DATA.valid.video_path}/annotations-2024-224p-valid.json
    framerate: 2
    window_size: 20
    dataloader:
      batch_size: 256
      shuffle: true
      num_workers: 4
      pin_memory: true

  test:
    type: FeatureVideosfromJSON
    classes: ${DATA.classes}
    output_map: [data, label]
    video_path: ${DATA.data_dir}
    path: ${DATA.test.video_path}/annotations-2024-224p-test.json
    results: results_spotting_test_netvlad++_resnetpca512
    framerate: 2
    window_size: 20
    metric: loose
    dataloader:
      batch_size: 1
      shuffle: false
      num_workers: 1
      pin_memory: true

MODEL:
    type: LearnablePooling
    runner:
      type: runner_JSON
    backbone:
      type: PreExtactedFeatures
      encoder: ResNET_TF2_PCA512
      feature_dim: 512
      output_dim: 512
      framerate: 2
      window_size: 20
    neck:
      type: NetVLAD++
      input_dim: 512
      output_dim: 32768 # 512 clusters * 64 vocab size
      vocab_size: 64
    head:
      type: LinearLayer
      input_dim: 32768
      num_classes: 17
    post_proc:
      type: NMS
      NMS_window: 30
      NMS_threshold: 0.0
    load_weights: null

TRAIN:
  type: trainer_pooling
  max_epochs: 200
  evaluation_frequency: 200
  framerate: 2
  batch_size: 256
  monitor: valid_loss
  mode: min

  criterion:
    type: NLLLoss

  optimizer:
    type: Adam
    lr: 0.001
    betas: [0.9, 0.999]
    eps: 1e-08
    weight_decay: 0
    amsgrad: false

  scheduler:
    type: ReduceLROnPlateau
    mode: min
    factor: 1e-03
    min_lr: 1e-06
    patience: 10
    verbose: true


SYSTEM:
  log_dir: ./logs
  save_dir: ./checkpoints
  work_dir: ${SYSTEM.save_dir}
  seed: 42
  GPU: 4        # number of gpus to use
  device: cuda   # auto | cuda | cpu
  gpu_id: 0      # device id for single gpu training

