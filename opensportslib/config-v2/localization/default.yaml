TASK: localization
VERSION: 2

SYSTEM:
  paths:
    log_dir: ./logs
    save_dir: ./checkpoints
    work_dir: ${SYSTEM.paths.save_dir}
  device: cuda
  gpu:
    count: 1
    id: 0
  reproducibility:
    use_seed: true
    seed: 42

DATA:
  common:
    dataset_name: SoccerNet
    data_dir: /path/to/data
    classes: []
    runtime:
      loader_backend: opencv
    splits:
      train:
        type: null
        annotation_path: /path/to/train.json
        source_path: /path/to/train
        dataloader:
          batch_size: 8
          shuffle: true
          num_workers: 4
          pin_memory: true
      valid:
        type: null
        annotation_path: /path/to/valid.json
        source_path: /path/to/valid
        dataloader:
          batch_size: 8
          shuffle: false
      test:
        type: null
        annotation_path: /path/to/test.json
        source_path: /path/to/test
        dataloader:
          batch_size: 4
          shuffle: false

  inputs:
    - modality: video
      representation: raw
      source:
        format: mp4
      sampling:
        clip_len: 100
        input_fps: 25
        extract_fps: 2
      transform:
        resize:
          height: 224
          width: 398
        normalization:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
      params:
        crop_dim: -1
        mixup: true
        dilate_len: 0

MODEL:
  family: e2e
  runner:
    type: runner_e2e
  streams:
    video:
      enabled: true
      backbone: {}
      neck: {}
      preprocessor: {}
  fusion:
    type: none
    params: {}
  head: {}
  post_proc: {}
  runtime:
    multi_gpu: true

TRAIN:
  trainer:
    type: trainer_e2e
  epochs: 10
  criterion:
    type: CrossEntropyLoss
  optimizer:
    type: AdamWithScaler
    lr: 0.01
  scheduler:
    type: ChainedSchedulerE2E
  execution:
    enabled: true
    acc_grad_iter: 1
    criterion_valid: map
    valid_map_every: 1
    base_num_valid_epochs: 30
    start_valid_epoch: 4
